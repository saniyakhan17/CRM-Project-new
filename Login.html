  <script>
    var serverError = '<?= typeof error !== "undefined" ? error : "" ?>';
    if (serverError) {
      var el = document.getElementById('errorMsg');
      el.innerText = serverError;
      el.classList.add('show');
    }

    function doLogin() {
      var email = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value.trim();

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerText = 'Signing in...';

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            var base = 'https://script.google.com/macros/s/AKfycbzmQHp9CP-Xc5bQZ_1y7nM2N6XC7Zl1BSnzXBOQZdfFck8JVzZYyMlmE_xpJ9wxaRSIsg/exec';
           var url = base + '?user=' + encodeURIComponent(email) + '&token=' + result.token + '&attRow=' + (result.attRow || 0) + '&fresh=1';

            btn.innerText = '✅ Click here to continue';
            btn.disabled = false;
            btn.onclick = function() {
              var a = document.createElement('a');
              a.href = url;
              a.target = '_top';
              document.body.appendChild(a);
              a.click();
            };
          } else {
            showError(result.message);
            btn.disabled = false;
            btn.innerText = 'Sign In';
          }
        })
        .withFailureHandler(function(err) {
          showError('Something went wrong. Please try again.');
          btn.disabled = false;
          btn.innerText = 'Sign In';
        })
        .validateLogin(email, password);
    }

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.innerText = msg;
      el.classList.add('show');
    }
  </script>
